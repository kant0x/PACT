[model]
id = "Qwen/Qwen3.5-2B"
trust_remote_code = false
load_in_4bit = true
quant_type = "nf4"
double_quant = true
compute_dtype = "float16"

[lora]
rank = 16
alpha = 32
dropout = 0.05
target_modules = "all-linear"

[training]
output_dir = "training/outputs/pact-qwen35-2b-v1"
max_length = 2048
epochs = 2.0
learning_rate = 0.0002
batch_size = 1
gradient_accumulation_steps = 16
warmup_ratio = 0.03
logging_steps = 5
eval_steps = 25
save_steps = 25
seed = 42
assistant_only_loss = true
gradient_checkpointing = true
optimizer = "paged_adamw_8bit"

[data]
train_file = "training/data/prepared/train.jsonl"
eval_file = "training/data/prepared/eval.jsonl"
manifest_file = "training/data/prepared/manifest.json"

[quality]
minimum_train_examples = 200
recommended_train_examples = 2000
maximum_duplicate_ratio = 0.02
require_first_party_license = true
