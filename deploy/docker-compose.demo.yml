services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    env_file:
      - .env.demo
    environment:
      NODE_ENV: production
      PORT: 4100
      PACT_MODE: demo
      PACT_DB_PATH: /app/data/pact.sqlite
      PACT_CORS_ORIGINS: ${PUBLIC_ORIGIN:-http://localhost}
      PACT_ENABLE_DEMO_ENDPOINTS: "true"
    volumes:
      - pact-data:/app/data
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
      args:
        VITE_API_URL: /
        VITE_API_TOKEN: ${VITE_API_TOKEN:-}
        VITE_PACT_MODE: demo
        VITE_AUTO_SEED_DEMO: "true"
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-80}:80"
    restart: unless-stopped

volumes:
  pact-data:
