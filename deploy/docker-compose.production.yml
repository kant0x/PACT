services:
  arena-docker:
    image: docker:27-dind
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    command: ["--host=tcp://0.0.0.0:2375", "--tls=false"]
    volumes:
      - arena-docker-data:/var/lib/docker
    networks:
      - runner
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    env_file:
      - ${PACT_ENV_FILE:-.env.production}
    environment:
      NODE_ENV: production
      PORT: 4100
      PACT_MODE: demo
      PACT_DB_PATH: /app/data/pact.sqlite
      PACT_CORS_ORIGINS: ${PUBLIC_ORIGIN:?Set PUBLIC_ORIGIN in deploy/.env.production}
      PACT_ENABLE_DEMO_ENDPOINTS: "false"
      PACT_REQUIRE_AGENT_SIGNATURES: "true"
      PACT_REQUIRE_ARENA_SIGNATURES: "true"
      ARENA_JUDGE_PROVIDER: openai
      ARBITRATOR_PROVIDER: council
      ARBITRATOR_FALLBACK: disabled
      DOCKER_HOST: tcp://arena-docker:2375
    depends_on:
      arena-docker:
        condition: service_healthy
    volumes:
      - pact-data:/app/data
    networks:
      - default
      - runner
    restart: unless-stopped

  arena-agent:
    build:
      context: ..
      dockerfile: Dockerfile.agent
    env_file:
      - ${PACT_ENV_FILE:-.env.production}
    environment:
      NODE_ENV: production
      PACT_API_URL: http://api:4100
      PACT_ARENA_POLL_INTERVAL_MS: ${PACT_ARENA_POLL_INTERVAL_MS:-30000}
    depends_on:
      - api
    restart: unless-stopped

networks:
  runner:
    driver: bridge

volumes:
  pact-data:
  arena-docker-data:
